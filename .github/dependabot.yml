# See docs/ci.md → "Pinning third-party actions" for context.
# Only github-actions is registered; package.json is locked in this
# environment so npm bumps would not be applicable.

version: 2

updates:
  - package-ecosystem: "github-actions"
    # `/` covers everything under .github/workflows/.
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
      include: "scope"
