name: Post-deploy trust-proxy probe

# Why this exists (task #379):
#
# `server/lib/trust-proxy-check.ts` (boot guard, task #326) catches
# trust-proxy misconfiguration on the code side at startup, and
# `scripts/check-trust-proxy-coverage.ts` (CI lint, task #378) catches
# new express() instances added without the boot guard. Neither catches
# a config change at the proxy layer (Replit edge, custom domain,
# future CDN) that silently re-introduces the bug WITHOUT any code
# change. When that happens, every per-IP rate limiter — most
# importantly the 5 req / 15 min setupAdminLimiter — collapses into a
# global ceiling for the entire internet (the proxy's loopback /
# private address becomes the keying address for everyone).
#
# This workflow runs `scripts/verify-trust-proxy-deploy.ts` against
# the live deployed app on a recurring schedule. The script:
#   - calls the system_admin-only debug endpoint
#     `GET /api/system-admin/trust-proxy-status`
#   - asserts the synthetic boot probe still reports OK (no Express
#     config drift since last boot),
#   - asserts the live `req.ip` is NOT a loopback / private address
#     (so per-IP limiters are still keying on real client addresses),
#   - optionally asserts an exact match against `EXPECTED_RESOLVED_IP`
#     when the runner has a known egress IP.
#
# A failed run fails the workflow, which surfaces in the standard
# GitHub Actions UI + email/Slack notifications configured at the
# repo / org level. Triggering on `workflow_dispatch` lets a release
# operator run it on demand immediately after pushing a deploy.
#
# Transient-error tolerance (task #660):
#   The Replit deploy edge / Cloud Run frontend will occasionally
#   return a plain "Internal server error. Correlation ID: <uuid>"
#   page when the container is briefly unavailable (cold start, brief
#   restart, transient edge hiccup). To stop those one-off blips from
#   paging on-call, the script retries a small bounded number of
#   times with exponential backoff + jitter on transport-level
#   failures only:
#     - any HTTP 5xx response
#     - any `fetch` rejection (network/DNS/abort)
#   It does NOT retry on any other status. Every assertion-level
#   failure (401 / synthetic.ok=false / private resolvedIp /
#   EXPECTED_RESOLVED_IP mismatch / malformed JSON / handler-shape
#   500) still fails on the FIRST observation — those are real
#   regressions and must page immediately. The final failure
#   message labels "edge returned 5xx (likely transient infra)" vs
#   "handler returned 5xx" so on-call can immediately tell which is
#   which without re-investigating.
#
#   Retry behavior is configurable via env vars (defaults chosen so
#   the worst-case wall time stays well under the job's
#   `timeout-minutes: 5`):
#     PROBE_MAX_ATTEMPTS    default 4. Set to 1 to disable retries.
#     PROBE_RETRY_BASE_MS   default 500. Base delay for exponential
#                           backoff (attempt k waits base * 2^(k-1)
#                           ± jitter).
#     PROBE_TIMEOUT_MS      default 10000 (per attempt). This
#                           workflow overrides to 30000 below — see
#                           cold-start note.
#
# N-strikes-before-paging (task #737):
#   Even with the cold-start mitigations below, a real edge incident or
#   an unusually long cold start that beats the warmup can still slip
#   one transient failure through. To stop a single isolated blip from
#   paging on-call, scheduled runs gate the JOB's pass/fail on a rolling
#   consecutive-failure streak instead of the immediate per-run result:
#     - 1st failure in a row  → job exits 0 with a ::warning:: noting
#                                "1st strike, suppressed"; no page.
#     - Nth failure in a row  → job exits 1 with a ::error:: explicitly
#                                labelled "N-strike alert"; pages.
#     - Any success           → streak resets to 0.
#   N is controlled by `STRIKE_THRESHOLD` (default 2). Manual
#   `workflow_dispatch` runs BYPASS the streak counter entirely and
#   fail/pass on the immediate result — an operator running this on
#   demand is debugging in real time and wants the immediate signal.
#
#   Strike-state mechanism: GitHub Actions cache (`actions/cache`).
#   Why this option over the alternatives:
#     - Gist: requires a PAT with gist write scope and pulls in an
#       extra credential to rotate; overkill for a single integer.
#     - Workflow artifact across runs: requires `actions: read` and
#       an API lookup to find the previous run's artifact; brittle
#       around retention windows and concurrent runs.
#     - Sentinel commit/branch: writes to the repo from CI, which
#       this workflow's `permissions: contents: read` explicitly
#       forbids; widening permissions for a counter is a worse
#       trade than using the cache.
#     - Cache: zero extra credentials, no extra permissions, built
#       into the same `actions/*` family already in this workflow.
#       The cache key embeds `${{ github.run_id }}` so each run
#       writes a fresh entry (cache keys are immutable); the
#       `restore-keys: probe-strike-` prefix loads the most recent
#       prior entry. The workflow's existing
#       `concurrency: post-deploy-trust-proxy` with
#       `cancel-in-progress: false` serializes runs so two runs
#       never race the counter. If GitHub evicts the cache (7 days
#       of no access, or LRU pressure on the repo's 10GB cache
#       quota) the streak silently resets to 0; the failure mode
#       is "we tolerate one extra blip", not "we miss a real
#       sustained outage".
#
#   Resetting the counter manually: trigger `workflow_dispatch` with
#   the deploy URL responding healthy; a single manual success does
#   NOT reset the streak (manual runs bypass it), but you can also
#   force a reset by deleting the `probe-strike-*` cache entries
#   from the repo's Actions → Caches UI, or by simply waiting for
#   the next scheduled success.
#
# Cold-start tolerance (task #736):
#   The probe's per-attempt timeout is deliberately TERMINAL — only
#   HTTP 5xx and network errors get the retry budget. Combined with
#   the 30-min cron cadence, the live container is frequently cold-
#   evicted by the Replit deploy edge / Cloud Run frontend, so the
#   first probe request after a long idle has been observed to eat a
#   cold-start hit > 10s and instantly fail with no retry. Two
#   measures here eliminate that false-positive class without
#   weakening any assertion:
#     1. A best-effort pre-warm step hits the public `/api/health`
#        endpoint with `curl --retry` BEFORE the verifier runs, so
#        the container is awake by the time the assertion-bearing
#        request goes out. The step is `continue-on-error: true` so
#        a transient warmup failure never itself becomes a new
#        false positive (the verifier still runs and decides).
#     2. `PROBE_TIMEOUT_MS` is set to 30000 (vs the script default
#        of 10000) as a safety margin so an unusually slow cold
#        start still doesn't false-page even when warmup didn't
#        fully wake the container. With max 4 attempts × 30s +
#        ~3.5s backoff the worst case is well under
#        `timeout-minutes: 5`.
#   These measures only affect transport-level latency; every
#   assertion-level failure still fails on the first observation
#   exactly as documented above.
#
# Repository secrets required:
#
# Handoff-repository gate:
#   Scheduled probes remain disabled until the deployed app exists and the
#   repository variable `DEPLOY_MONITOR_ENABLED` is set to `true`. Manual
#   `workflow_dispatch` runs remain available for setup/debugging and still
#   fail clearly when the URL or authentication secret is missing.
#   DEPLOY_BASE_URL    — e.g. https://app.example.com (no trailing /)
#
#   AND exactly ONE of the following auth secrets:
#     DEPLOY_PROBE_TOKEN  — PREFERRED. Long-lived shared secret (>=32
#                         chars) matching the server's
#                         `TRUST_PROXY_PROBE_TOKEN` env var. Sent as
#                         the `X-Probe-Token` header. No rotation
#                         needed; rotate only if compromised.
#                         Generate with `openssl rand -hex 32` and
#                         paste the SAME value into both:
#                           - the deployed app's environment
#                             (TRUST_PROXY_PROBE_TOKEN), and
#                           - this repo's secrets (DEPLOY_PROBE_TOKEN).
#     DEPLOY_ADMIN_COOKIE — LEGACY. Full Cookie header value for a
#                         system_admin session (e.g. "connect.sid=s%3A
#                         …"). Expires when the session expires
#                         (~24h — see `cookie.maxAge` in
#                         `server/auth.ts`), so this path requires
#                         manual refresh. Only used when
#                         DEPLOY_PROBE_TOKEN is unset. A long-lived
#                         service-account session is the intended
#                         source; do NOT paste a real human
#                         operator's cookie.
#
# Optional repository secret:
#   DEPLOY_EXPECTED_RESOLVED_IP — pin the exact IP the runner is
#                         expected to appear as. Skip if you don't
#                         control egress (GitHub-hosted runners use a
#                         rotating pool); the loopback/private check
#                         alone is still meaningful.
#
# This workflow is intentionally NOT gated on `pull_request` — it
# probes the live deployed environment, which a PR has not yet
# touched. CI-side coverage of the script's own logic is tracked
# separately as a follow-up.

on:
  # Recurring probe — every 30 minutes. Cheap (one HTTP request) and
  # tight enough to catch a bad proxy config within one rate-limit
  # window of when it lands.
  schedule:
    - cron: '*/30 * * * *'
  # On-demand trigger so a release operator can run it immediately
  # after a deploy without waiting for the next cron tick.
  workflow_dispatch:
    inputs:
      base_url_override:
        description: 'Override DEPLOY_BASE_URL for this run (optional)'
        required: false
        type: string

# Minimum-privilege token: the job only reads the repo to check it
# out and reads the configured secrets. It does not write back, does
# not touch issues/PRs, does not publish anything.
permissions:
  contents: read

# Don't pile up overlapping cron runs if a previous one is slow.
concurrency:
  group: post-deploy-trust-proxy
  cancel-in-progress: false

jobs:
  probe:
    name: Probe trust-proxy on live deploy
    # Chris's handoff repository is not necessarily deployed when it is
    # imported. Do not turn an unconfigured scheduled monitor into a red CI
    # signal. Once the app is live, set DEPLOY_MONITOR_ENABLED=true and add
    # the required repository secrets; manual runs always remain available.
    if: ${{ github.event_name == 'workflow_dispatch' || vars.DEPLOY_MONITOR_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    # The probe is a single HTTP round-trip; 5 minutes is generous
    # ceiling that still kills a hung run before it eats CI budget.
    timeout-minutes: 5
    env:
      # Single source of truth for the N-strikes threshold (task #737).
      # Change here to adjust how many consecutive scheduled failures
      # are required before the job fails loudly. Both the streak-update
      # step and the final-outcome step read this same value.
      STRIKE_THRESHOLD: '2'
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          # Pinned to the runtime declared in `.node-version` so the
          # script runs under the same node major as the live app.
          # Bump in lockstep when the Node version moves.
          node-version: '22.22.0'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` is overkill for a script with no project deps,
        # but it gives us `tsx` from devDependencies without any
        # extra setup and matches the install posture of the other
        # workflows in this repo.
        run: npm ci

      - name: Pre-warm the live container (best-effort)
        # Why this exists (task #736): the verifier's per-attempt
        # timeout is terminal, and on a 30-min cron the container
        # often goes cold between runs. A short warmup against the
        # public `/api/health` endpoint wakes the container so the
        # assertion-bearing probe runs against a warm instance.
        # `continue-on-error: true` + the trailing `|| true` make
        # this step strictly best-effort — a transient warmup
        # failure must not become a new false positive; the
        # verifier itself is the authoritative pass/fail signal.
        # Connect timeout 5s, total per-attempt timeout 10s,
        # 3 retries with backoff = ~30s worst case.
        continue-on-error: true
        env:
          BASE_URL: ${{ github.event.inputs.base_url_override || secrets.DEPLOY_BASE_URL }}
        run: |
          set -u
          if [ -z "${BASE_URL:-}" ]; then
            echo "[prewarm] BASE_URL not set; skipping warmup"
            exit 0
          fi
          echo "[prewarm] hitting ${BASE_URL%/}/api/health"
          curl -fsS \
            --connect-timeout 5 \
            --max-time 10 \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 2 \
            -o /dev/null \
            -w "[prewarm] http=%{http_code} total=%{time_total}s\n" \
            "${BASE_URL%/}/api/health" || echo "[prewarm] warmup failed (non-fatal); verifier will still run"

      # Restore the consecutive-failure streak counter from the most
      # recent prior scheduled run (task #737). Only restored on
      # `schedule` runs — manual `workflow_dispatch` runs bypass the
      # streak entirely and fail/pass on the immediate result.
      # `restore-keys: probe-strike-` matches the most recent
      # `probe-strike-<run_id>` cache entry. If no prior cache exists
      # (first run, eviction, manual delete) the streak file is
      # absent and the next step treats the prior streak as 0.
      - name: Restore strike counter
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v6
        with:
          path: .probe-state
          key: probe-strike-${{ github.run_id }}
          restore-keys: |
            probe-strike-

      - name: Run the trust-proxy verifier
        id: verify
        # `continue-on-error: true` so a failure does not short-circuit
        # the streak-update + cache-save steps below. The job's final
        # pass/fail is decided by the "Decide final outcome" step,
        # which reads `steps.verify.outcome` and the streak.
        continue-on-error: true
        env:
          BASE_URL: ${{ github.event.inputs.base_url_override || secrets.DEPLOY_BASE_URL }}
          # Token-based auth (preferred). When set, the script sends
          # `X-Probe-Token` and the cookie is ignored.
          PROBE_TOKEN: ${{ secrets.DEPLOY_PROBE_TOKEN }}
          # Cookie-based auth (legacy). Only used when PROBE_TOKEN is
          # unset. Refresh manually when the session expires.
          ADMIN_COOKIE: ${{ secrets.DEPLOY_ADMIN_COOKIE }}
          EXPECTED_RESOLVED_IP: ${{ secrets.DEPLOY_EXPECTED_RESOLVED_IP }}
          # Override the script's 10s default per-attempt timeout
          # (task #736). 30s comfortably absorbs any residual
          # cold-start latency the pre-warm step didn't eliminate.
          # Worst-case wall time: 4 attempts × 30s + ~3.5s backoff
          # = ~123s, still well under `timeout-minutes: 5`.
          PROBE_TIMEOUT_MS: '30000'
        # Invoke `tsx` directly (mirrors the pattern in
        # `tests/unit/check-trust-proxy-coverage.test.ts` — the
        # `package.json` scripts section is intentionally locked in
        # this environment so we cannot add an `npm run` shortcut).
        run: node node_modules/tsx/dist/cli.mjs scripts/verify-trust-proxy-deploy.ts

      # Update the rolling consecutive-failure streak (task #737).
      # Only runs on scheduled runs; manual runs skip the counter.
      - name: Update strike counter
        id: strike
        if: github.event_name == 'schedule'
        env:
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
        run: |
          set -eu
          mkdir -p .probe-state
          PREV=0
          if [ -f .probe-state/streak ]; then
            PREV=$(cat .probe-state/streak | tr -dc '0-9')
            PREV=${PREV:-0}
          fi
          if [ "$VERIFY_OUTCOME" = "success" ]; then
            echo "0" > .probe-state/streak
            echo "[strike] verifier succeeded; resetting streak (was $PREV)"
            echo "should_fail=false" >> "$GITHUB_OUTPUT"
            echo "new_streak=0" >> "$GITHUB_OUTPUT"
          else
            NEW=$((PREV + 1))
            echo "$NEW" > .probe-state/streak
            echo "[strike] verifier failed; consecutive failure streak now $NEW (threshold: $STRIKE_THRESHOLD)"
            echo "new_streak=$NEW" >> "$GITHUB_OUTPUT"
            if [ "$NEW" -ge "$STRIKE_THRESHOLD" ]; then
              echo "should_fail=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_fail=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      # Persist the updated streak so the next scheduled run can read
      # it via `restore-keys: probe-strike-`. Cache keys are immutable,
      # so we write under a fresh per-run key. `if: always()` ensures
      # we save even if an earlier step failed unexpectedly (so a
      # transient infra hiccup in the cache step doesn't lose state).
      - name: Save strike counter
        if: github.event_name == 'schedule' && always()
        uses: actions/cache/save@v6
        with:
          path: .probe-state
          key: probe-strike-${{ github.run_id }}

      # Final job pass/fail decision (task #737).
      #   - schedule + success           → exit 0 (streak reset)
      #   - schedule + 1st failure (<N)  → exit 0 + ::warning::
      #     (suppressed; will fail loudly next time if it stays bad)
      #   - schedule + Nth failure (>=N) → exit 1 + ::error:: labelled
      #     "N-strike alert" so on-call can immediately tell this
      #     isn't a one-off blip
      #   - workflow_dispatch            → exit code mirrors verifier
      #     (operator wants the immediate signal)
      - name: Decide final outcome
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          VERIFY_OUTCOME: ${{ steps.verify.outcome }}
          SHOULD_FAIL: ${{ steps.strike.outputs.should_fail }}
          NEW_STREAK: ${{ steps.strike.outputs.new_streak }}
        run: |
          set -eu
          if [ "$EVENT_NAME" != "schedule" ]; then
            echo "[outcome] manual run (event=$EVENT_NAME); bypassing strike counter"
            if [ "$VERIFY_OUTCOME" = "success" ]; then
              echo "[outcome] verifier succeeded"
              exit 0
            fi
            echo "::error::Trust-proxy verifier failed on manual run; see verifier step output above."
            exit 1
          fi
          if [ "$VERIFY_OUTCOME" = "success" ]; then
            echo "[outcome] scheduled run succeeded; streak reset to 0"
            exit 0
          fi
          if [ "$SHOULD_FAIL" = "true" ]; then
            echo "::error::N-strike alert: trust-proxy verifier has now failed ${NEW_STREAK} consecutive scheduled runs (threshold: ${STRIKE_THRESHOLD}). This is NOT a one-off blip — investigate the live deploy's proxy/trust-proxy config now. See task #737 for context on the strike counter."
            exit 1
          fi
          echo "::warning::Trust-proxy verifier failed (strike ${NEW_STREAK}/${STRIKE_THRESHOLD}); suppressing alert per task #737. If the next scheduled run also fails, this workflow will fail loudly. See verifier step output above for the failure detail."
          exit 0
