name: CI

# Run on every pull request to main and on every push to main.
# Push-to-main is included so the dashboard shows a green/red
# checkmark for the tip of main even after a merge bypasses the PR
# gate (e.g. a fast-forward from a privileged user).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-flight run for the same ref when a new push lands.
# A PR that gets a quick follow-up commit shouldn't burn an extra
# few minutes finishing the now-superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimum-privilege GITHUB_TOKEN. This job only needs to read the
# repo to check it out; it doesn't write anything back, doesn't
# touch issues/PRs, and doesn't publish packages. Adding any of
# those will require a deliberate, in-diff escalation.
permissions:
  contents: read

jobs:
  # Single job that runs the static checks (type checker, lint suite,
  # and CSRF coverage guard) sequentially. Task #372 wired the type
  # check and lint steps; task #398 added the CSRF coverage step
  # (`scripts/check-csrf-coverage.ts`) so a regression that mounts a
  # state-changing route outside the global `/api` CSRF prefix can no
  # longer slip through review. The job's `name:` is deliberately
  # preserved as "Type check & lint" so any GitHub branch-protection
  # rule keyed on that name keeps working — when adding a fourth
  # static check, append a step rather than rename the job. Broader
  # checks (vitest, the eslint-baseline ratchet from #404, etc.) are
  # owned by their own follow-up tasks and will land in their own
  # workflow files or as additional steps here over time.
  check-and-lint:
    name: Type check & lint
    runs-on: ubuntu-latest
    # The check+lint+csrf trio takes ~1 minute locally; 10 is a
    # generous ceiling that still kills a runaway install / hung
    # dev-server spawn before it eats CI budget for an hour.
    timeout-minutes: 10
    steps:
      - name: Check out the PR
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned to the runtime declared in `replit.md` so CI matches
          # the dev/prod environment. Bump in lockstep when that file
          # gets bumped.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `npm run check` = `tsc`. Catches the `noImplicitAny` /
      # `strict` half of the escape-hatch contract enforced by the
      # lint step below — together they pin both compile-time and
      # source-level escape hatches.
      - name: Type check
        run: npm run check

      # `npm run lint` = `eslint .`. Fails (non-zero exit) on any
      # net-new violation of `@typescript-eslint/no-explicit-any`
      # (#299) or `@typescript-eslint/ban-ts-comment` (#328) — see
      # `docs/lint.md` for the contract and the existing-debt
      # baseline in `eslint-suppressions.json`.
      - name: Lint
        run: npm run lint

      # `npm run check:csrf` = `tsx scripts/check-csrf-coverage.ts`.
      # Walks `server/` and fails if any state-changing route has an
      # effective path outside `/api` without an entry in
      # `EXPLICIT_NON_API_ALLOWLIST`. Covers direct `app.<method>(...)`
      # calls, single-level `app.use('<prefix>', router)` mounts, and
      # nested `parentRouter.use('<sub>', childRouter)` composition
      # transitively (#397). The guard's own behavior is pinned by
      # 23 unit fixtures in `tests/unit/check-csrf-coverage.test.ts`,
      # which run as part of the vitest suite (separate workflow when
      # that lands). Contract and limitations are documented in
      # `docs/security/csrf-coverage.md`. Wired into CI in #398.
      - name: CSRF coverage
        run: npm run check:csrf
