name: CI

# Run on every pull request to main and on every push to main.
# Push-to-main is included so the dashboard shows a green/red
# checkmark for the tip of main even after a merge bypasses the PR
# gate (e.g. a fast-forward from a privileged user).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-flight run for the same ref when a new push lands.
# A PR that gets a quick follow-up commit shouldn't burn an extra
# few minutes finishing the now-superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimum-privilege GITHUB_TOKEN. This job only needs to read the
# repo to check it out; it doesn't write anything back, doesn't
# touch issues/PRs, and doesn't publish packages. Adding any of
# those will require a deliberate, in-diff escalation.
permissions:
  contents: read

jobs:
  # Single job that runs the static checks (type checker, lint suite,
  # CSRF coverage guard, and cross-org isolation coverage guard)
  # sequentially. Task #372 wired the type check and lint steps;
  # task #398 added the CSRF coverage step
  # (`scripts/check-csrf-coverage.ts`) so a regression that mounts a
  # state-changing route outside the global `/api` CSRF prefix can no
  # longer slip through review. Task #400 added the org-isolation
  # coverage step (`scripts/check-org-isolation-coverage.ts --strict`)
  # so a new id-bearing GET endpoint can no longer be added without
  # either a cross-org assertion in
  # `tests/api/organization-isolation.test.ts` or an inline
  # `EXPLICIT_ALLOWLIST` justification. The job's `name:` is
  # deliberately preserved as "Type check & lint" so any GitHub
  # branch-protection rule keyed on that name keeps working — when
  # adding a fifth static check, append a step rather than rename the
  # job. The vitest suite (including the eslint-baseline ratchet's
  # self-test from #404) runs in the sibling `Tests` job below,
  # wired in by task #442. The opt-in race suite has its own
  # workflow (`race-suite.yml`); see `docs/ci.md` for the full
  # layout.
  check-and-lint:
    name: Type check & lint
    runs-on: ubuntu-latest
    # The check+lint+csrf+org-isolation quartet takes ~1 minute
    # locally; 10 is a generous ceiling that still kills a runaway
    # install / hung dev-server spawn before it eats CI budget for an
    # hour.
    timeout-minutes: 10
    steps:
      # SHA-pinned per docs/ci.md → "Pinning third-party actions".
      - name: Check out the PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Pinned to the runtime declared in `replit.md` so CI matches
          # the dev/prod environment. Bump in lockstep when that file
          # gets bumped.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `npm run check` = `tsc`. Catches the `noImplicitAny` /
      # `strict` half of the escape-hatch contract enforced by the
      # lint step below — together they pin both compile-time and
      # source-level escape hatches.
      - name: Type check
        run: npm run check

      # `npm run lint` = `eslint .`. Fails (non-zero exit) on any
      # net-new violation of `@typescript-eslint/no-explicit-any`
      # (#299) or `@typescript-eslint/ban-ts-comment` (#328) — see
      # `docs/lint.md` for the contract and the existing-debt
      # baseline in `eslint-suppressions.json`.
      - name: Lint
        run: npm run lint

      # `npm run check:csrf` = `tsx scripts/check-csrf-coverage.ts`.
      # Walks `server/` and fails if any state-changing route has an
      # effective path outside `/api` without an entry in
      # `EXPLICIT_NON_API_ALLOWLIST`. Covers direct `app.<method>(...)`
      # calls, single-level `app.use('<prefix>', router)` mounts, and
      # nested `parentRouter.use('<sub>', childRouter)` composition
      # transitively (#397). The guard's own behavior is pinned by
      # 23 unit fixtures in `tests/unit/check-csrf-coverage.test.ts`,
      # which run as part of the vitest suite in the sibling `Tests`
      # job below (wired in by #442). Contract and limitations are
      # documented in `docs/security/csrf-coverage.md`. Wired into CI
      # in #398.
      - name: CSRF coverage
        run: npm run check:csrf

      # `npm run check:org-isolation` =
      # `tsx scripts/check-org-isolation-coverage.ts --strict`.
      # Walks `server/routes/`, finds every id-bearing GET endpoint
      # (handlers that read `req.query.<entity>Id` or whose path
      # contains `:id` / `:<entity>Id`), computes the effective full
      # path through nested `router.use('<sub>', child)` composition,
      # and fails if any path is missing a cross-org assertion in
      # `tests/api/organization-isolation.test.ts` and is not on the
      # script's `EXPLICIT_ALLOWLIST` (each allowlist entry requires an
      # inline justification). Task #399 closed the existing 14 gaps
      # before this step was wired in strict mode, so the gate starts
      # green and any new uncovered endpoint will fail this step at
      # PR time. The guard's own behavior is pinned by unit fixtures
      # in `tests/unit/check-org-isolation-coverage.test.ts`. Contract
      # and limitations are documented in
      # `docs/security/org-isolation-coverage.md`. Wired into CI in
      # #400.
      - name: Cross-org isolation coverage
        run: npm run check:org-isolation

      # `tsx scripts/check-wire-sanitization.ts` (task #382). Loads the
      # same TypeScript program `npm run check` uses, walks every
      # `sendSuccess` / `sendPaginatedSuccess` / `res.json` /
      # `res.status(...).json` call site under `server/`, and fails if
      # any data argument is structurally assignable to `User` or
      # `Organization` (or `User[]` / `Organization[]`). The
      # `sanitizeUser` / `sanitizeOrg` allowlist projections from
      # `server/utils/api.ts` produce `SanitizedUser` /
      # `SanitizedOrganization` (`Pick<User, …>` / `Pick<Organization, …>`
      # with sensitive columns dropped), which are NOT assignable to
      # the full row types — so the canonical wrap stays green and any
      # new route that hands a raw row to a response helper fails
      # this step. Contract and limitations are documented in
      # `docs/lint.md` alongside the existing escape-hatch gates.
      # The guard's own behavior is pinned by
      # `tests/unit/check-wire-sanitization.test.ts`, which runs in
      # the sibling Tests job below.
      - name: Wire sanitization (raw User/Organization)
        run: tsx scripts/check-wire-sanitization.ts

      # `npm run build` = `vite build && esbuild server/index.ts ...`
      # (task #468). Runs the full production build of both halves of
      # the app:
      #
      #   * `vite build` does the production bundle of the React
      #     client. This catches things the dev server happily papers
      #     over — a broken `@/`-aliased import, a missing static
      #     asset, a route component that only resolves through Vite's
      #     dev-mode resolver, or a chunk that blows past the size
      #     budget. Without this step a PR can land green and only
      #     break at deploy time.
      #
      #   * `esbuild server/index.ts --platform=node --packages=external
      #     --bundle --format=esm --outdir=dist` produces the
      #     `dist/index.js` that `npm start` actually executes in
      #     production. `npm run dev` runs `tsx server/index.ts`, which
      #     uses tsx's loader to resolve TS-only imports and path
      #     aliases — those would crash `node dist/index.js` at boot.
      #     This step catches that mismatch at PR time instead of at
      #     deploy time.
      #
      # Placed last in the static-check sequence on purpose: it's the
      # most expensive of the five steps (~20-40s wall clock for the
      # Vite half on a GitHub-hosted runner), so the cheaper checks
      # (tsc, lint, csrf, org-isolation, wire-sanitization) get to
      # fail fast first if any of them is going to fail. No DB / no
      # services / no secrets needed — the build is purely static.
      # The `dist/` output is intentionally not uploaded as an artifact;
      # the goal here is to gate the PR on a clean exit code, not to
      # ship a build to anything downstream.
      - name: Production build
        run: npm run build

  # Sibling job that runs the full vitest suite (`npm test`) on every PR
  # and push to `main`. Task #442 wired this in: before this job
  # existed, the test suite was the safety net the project was leaning
  # on most heavily — the eslint-suppressions ratchet from #404
  # (`tests/unit/check-eslint-baseline.test.ts`, which deliberately
  # asserts itself via vitest because `package.json` is locked), the
  # CSRF and cross-org coverage guards' own self-tests, the auth /
  # CSRF / payment-sync route contracts, and ~hundreds of unit tests
  # — but it was only invoked when a contributor remembered to run
  # `npm test` locally. CI now runs it on every PR so a regression in
  # any of those guards fails the build instead of slipping past.
  #
  # Why a sibling job and not a step on `check-and-lint`:
  #   * `check-and-lint` is intentionally pinned at "Type check & lint"
  #     for branch-protection rules and is fast (~1 minute, no
  #     services, no DB). Adding the test step there would force every
  #     PR to wait on Postgres + dev-server boot for a check that is
  #     conceptually different.
  #   * Running tests in their own job lets the static checks fail
  #     fast and surface their result in the PR status list
  #     independently of the slower test job.
  #   * The two jobs run in parallel, so total wall-clock for the PR
  #     is ~max(check-and-lint, tests), not the sum.
  #
  # The race suite (`scripts/test-race.sh`) is NOT invoked here — it
  # has its own workflow (`.github/workflows/race-suite.yml`) which
  # gates on touched files and runs the two opt-in race files
  # serially. That suite is gated behind `RUN_BOOTSTRAP_RACE_TESTS=1`
  # so it is naturally skipped by `npm test`.
  #
  # See `docs/ci.md` for the full layout of which suite runs in which
  # job and the env-var contract.
  tests:
    name: Tests
    runs-on: ubuntu-latest
    # The full vitest suite (parallel + serial-fk-bypass +
    # client-components projects) takes ~3-4 minutes locally on top of
    # ~1 minute for npm ci and Postgres bring-up. 20 is a generous
    # ceiling that still kills a hung dev-server boot or a deadlocked
    # test before it eats CI budget for an hour. Mirrors the ceiling
    # used in `race-suite.yml` for the same reason.
    timeout-minutes: 20

    # Ephemeral Postgres so the API tests (and the unit tests that
    # import `server/db` for fixture seeding via `installDbInvariants`
    # in `tests/setup/global-setup.ts`) can talk to a real database.
    # Using `postgres:16` matches the prod runtime and the version the
    # Drizzle migrations have been validated against — same pin as
    # `race-suite.yml`, deliberately, so a future runtime bump only
    # has to be applied in one place at a time.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: leaguevault_test
        ports:
          - 5432:5432
        # Wait for `pg_isready` before the job's own steps can connect.
        # Without this, `npm run db:push` can race the container's
        # initdb and fail on a cold cache.
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      # SHA-pinned per docs/ci.md → "Pinning third-party actions".
      - name: Check out the PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # Pinned to the runtime declared in `replit.md` so CI matches
          # the dev/prod environment. Bump in lockstep when that file
          # gets bumped (mirrors `check-and-lint` and `race-suite`).
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Apply the Drizzle schema to the empty Postgres container.
      # `db:push` is idempotent and matches what `npm run dev` expects
      # to find on first boot. Same step name + invocation as
      # `race-suite.yml` so the two workflows can share remediation
      # docs.
      - name: Apply database schema
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/leaguevault_test
        run: npm run db:push

      # Boot the same dev server the API tests talk to. The HTTP-based
      # tests under `tests/api/` resolve their base URL through
      # `tests/helpers.ts`, which falls back to
      # `http://localhost:5000` when no `REPLIT_DEV_DOMAIN` /
      # `TEST_BASE_URL` is set — that's the path CI takes.
      #
      # `tests/setup/global-setup.ts` runs `installDbInvariants()` and
      # `seedTestUsers()` at vitest start, so we don't need a separate
      # `npm run seed` step.
      #
      # Env var contract (kept in sync with `race-suite.yml`):
      #   * DATABASE_URL — points at the service container above.
      #   * SESSION_SECRET — any non-empty value; tests don't rely on
      #     cookie persistence beyond the request lifetime.
      #   * FIELD_ENCRYPTION_KEY — must be 64 hex chars (32 bytes) per
      #     `server/config.ts`. The value below is a deterministic
      #     CI-only key; it is never used to decrypt real data because
      #     the Postgres container is fresh each run.
      #   * SETUP_SECRET — pulled from the `SETUP_SECRET` repository
      #     secret. Required by `tests/api/setup-admin-header.test.ts`
      #     and the `/api/setup/*` route guards. Tests that explicitly
      #     need a value compare against this env var via
      #     `tests/helpers.ts`.
      #   * NODE_ENV=development — keeps the auth rate limiter in dev
      #     mode (see `server/routes/auth.ts`) so repeated requests
      #     during the test run don't trip the per-IP cap.
      - name: Start dev server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/leaguevault_test
          SESSION_SECRET: ci-tests-session-secret
          FIELD_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          SETUP_SECRET: ${{ secrets.SETUP_SECRET }}
          NODE_ENV: development
          PORT: '5000'
        run: |
          # Background the dev server and capture its PID so the
          # cleanup step can SIGTERM it cleanly even if the test step
          # fails. Output goes to a logfile we tail on failure for
          # debugging.
          npm run dev > /tmp/dev-server.log 2>&1 &
          echo $! > /tmp/dev-server.pid
          echo "Dev server started with PID $(cat /tmp/dev-server.pid)"

      # Poll `/api/health` until the server reports healthy. 60
      # attempts × 2s = 2 min ceiling, which comfortably covers a cold
      # Vite startup on a GitHub-hosted runner. Identical to the
      # corresponding step in `race-suite.yml` — keep the two in sync
      # if the boot path ever changes.
      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5000/api/health > /dev/null; then
              echo "Dev server is healthy after ${i} attempt(s)."
              exit 0
            fi
            sleep 2
          done
          echo "Dev server failed to become healthy within 120s." >&2
          echo "--- last 200 lines of /tmp/dev-server.log ---" >&2
          tail -n 200 /tmp/dev-server.log >&2 || true
          exit 1

      # `npm test` = `vitest run`, which executes the three projects
      # declared in `vitest.config.ts` (parallel, serial-fk-bypass,
      # client-components). The two opt-in race files are gated behind
      # `RUN_BOOTSTRAP_RACE_TESTS=1` and are NOT run here — they have
      # their own workflow (`race-suite.yml`).
      #
      # Env vars match the dev-server step above so tests that read
      # the same secrets (e.g. `setup-admin-header.test.ts` reads
      # `SETUP_SECRET` via `tests/helpers.ts`) see the same value the
      # server was booted with.
      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/leaguevault_test
          SESSION_SECRET: ci-tests-session-secret
          FIELD_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          SETUP_SECRET: ${{ secrets.SETUP_SECRET }}
          NODE_ENV: development
        run: npm test

      # Always-run cleanup: SIGTERM the backgrounded dev server so the
      # job finishes promptly even when the test step fails. `|| true`
      # absorbs the case where the server already exited (e.g. crashed
      # during the run, in which case the failed test step already
      # surfaced the failure).
      - name: Stop dev server
        if: always()
        run: |
          if [ -f /tmp/dev-server.pid ]; then
            kill "$(cat /tmp/dev-server.pid)" 2>/dev/null || true
          fi

      # On failure, dump the dev server log so the failing run is
      # debuggable from the GH Actions UI without having to re-run
      # locally. Skipped on success so the green-path log stays clean.
      - name: Dump dev server log on failure
        if: failure()
        run: |
          echo "--- /tmp/dev-server.log ---"
          tail -n 500 /tmp/dev-server.log || true
